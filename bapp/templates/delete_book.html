{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body text-center">

        <h3>Delete Book</h3>

        <p>
            Are you sure you want to delete
            <strong>{{ book.title }}</strong> ?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button type="submit"
                    class="btn btn-danger">
                Delete
            </button>

            <a href="{% url 'book_list' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
