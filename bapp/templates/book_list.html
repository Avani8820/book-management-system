{% extends 'base.html' %}

{% block content %}

<h2>Books</h2>

<a href="{% url 'add_book' %}"
   class="btn btn-success mb-3">
    Add Book
</a>

<table class="table table-bordered table-striped">

    <thead class="table-dark">

    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>ISBN</th>
        <th>Published</th>
        <th>Actions</th>
    </tr>

    </thead>

    <tbody>

    {% for book in books %}

    <tr>

        <td>{{ book.title }}</td>

        <td>{{ book.author }}</td>

        <td>{{ book.category }}</td>

        <td>{{ book.isbn }}</td>

        <td>{{ book.published_date }}</td>

        <td>

            <a href="{% url 'edit_book' book.id %}"
               class="btn btn-warning btn-sm">
                Edit
            </a>

            <a href="{% url 'delete_book' book.id %}"
               class="btn btn-danger btn-sm">
                Delete
            </a>

        </td>

    </tr>

    {% empty %}

    <tr>
        <td colspan="6" class="text-center">
            No books available
        </td>
    </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
